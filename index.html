    </div>
    <form class="add-book-form hide" id="add-book-form">
        <legend>Add new book</legend>

        <div class="form-item">
            <label for="book-title-input">Book title</label>
            <input id="book-title-input" name="book-title-input" type="text" required>
        </div>

        <div class="form-item">
            <label for="book-author-input">Book author</label>
            <input id="book-author-input" name="book-author-input" type="text" required>
        </div>

        <div class="form-item">
            <label for="book-num-of-pages-input">Number of pages</label>
            <input id="book-num-of-pages-input" name="book-num-of-pages-input" type="number" required>
        </div>

        <div class="form-item check">
            <label for="book-is-read-input">Have you already read this book?</label>
            <input id="book-is-read-input" name="book-is-read-input" type="checkbox">
        </div>

        <button id="submit-book-form" type="submit">Add Book</button>

        <button id="close-book-form" type="button">Close</button>
    </form>
